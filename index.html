<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyHub v2.0.0</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e2230;
    --surface3: #252b3b;
    --border: #2a3048;
    --accent: #5b8af0;
    --accent2: #7c5bf0;
    --green: #3dd68c;
    --orange: #f0914d;
    --red: #f05b5b;
    --yellow: #f0d45b;
    --text: #e8ecf4;
    --text2: #8b94b0;
    --text3: #4a5270;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  body.light-mode {
    --bg: #f0f2f7;
    --surface: #ffffff;
    --surface2: #e8ecf4;
    --surface3: #dde2ee;
    --border: #c8d0e4;
    --accent: #4070e0;
    --accent2: #6040e0;
    --green: #1faa6a;
    --orange: #d4721a;
    --red: #d03a3a;
    --yellow: #c8a800;
    --text: #1a1f2e;
    --text2: #4a5270;
    --text3: #8b94b0;
    --shadow: 0 4px 24px rgba(0,0,0,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  button, a, [onclick] {
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    transition: opacity 0.2s;
  }
  .logo:hover { opacity: 0.75; }
  .logo span { color: var(--text2); font-weight: 400; }
  nav {
    display: flex;
    gap: 2px;
    flex-shrink: 1;
    min-width: 0;
  }
  nav button {
    background: none;
    border: none;
    color: var(--text2);
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    line-height: 1;
    white-space: nowrap;
  }
  nav button:hover { background: var(--surface2); color: var(--text); }
  nav button.active { background: var(--accent); color: #fff; }

  /* LAYOUT */
  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 28px;
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text3);
    margin-bottom: 16px;
  }

  /* DASHBOARD */
  .dashboard-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-label { font-size: 12px; color: var(--text2); }
  .stat-card.accent .stat-num { color: var(--accent); }
  .stat-card.green .stat-num { color: var(--green); }
  .stat-card.orange .stat-num { color: var(--orange); }
  .stat-card.yellow .stat-num { color: var(--yellow); }

  .dashboard-bottom {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
  }

  /* TODAY TASKS in dashboard */
  .today-task-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .today-task-item:last-child { border-bottom: none; }
  .today-task-item input[type=checkbox] { width:18px; height:18px; accent-color: var(--accent); cursor:pointer; flex-shrink:0; }
  .today-task-item.done span { text-decoration: line-through; color: var(--text3); }
  .tag-pill {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
    margin-left: auto;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* CALENDAR */
  .calendar-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .cal-nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .cal-nav-btn:hover { background: var(--surface3); }
  .cal-month { font-weight: 700; font-size: 16px; }
  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 4px;
  }
  .cal-weekday {
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    padding: 4px 0;
    font-weight: 700;
    text-transform: uppercase;
  }
  .cal-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    padding: 4px 5px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    flex-direction: column;
    gap: 2px;
  }
  .cal-day:hover { background: var(--surface2); }
  .cal-day.other-month { color: var(--text3); }
  .cal-day.today { background: var(--accent); color: #fff; font-weight: 700; }
  .cal-day.today::before { content: ''; }
  .cal-day.has-event::after {
    content: '';
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--orange);
    position: absolute;
    bottom: 4px;
  }
  .cal-day.today.has-event::after { background: #fff; }
  .cal-day.selected { border: 2px solid var(--accent); }

  /* Events panel */
  .event-list { display: flex; flex-direction: column; gap: 10px; }
  .event-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px 14px;
    border-left: 3px solid var(--accent);
  }
  .event-item.orange { border-left-color: var(--orange); }
  .event-item.green { border-left-color: var(--green); }
  .event-item.red { border-left-color: var(--red); }
  .event-time {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
    min-width: 48px;
    padding-top: 2px;
  }
  .event-title { font-size: 14px; font-weight: 500; }
  .event-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .add-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: opacity 0.2s;
    font-weight: 700;
  }
  .add-btn:hover { opacity: 0.85; }
  .add-btn.secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }

  /* MATERIALS */
  .materials-layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 20px;
    align-items: start;
  }
  .subject-list { display: flex; flex-direction: column; gap: 6px; }
  .subject-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: background 0.15s;
    border: 1px solid transparent;
  }
  .subject-item:hover { background: var(--surface2); }
  .subject-item.active { background: var(--surface2); border-color: var(--border); }
  .subject-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .subject-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text3);
    background: var(--surface3);
    border-radius: 20px;
    padding: 2px 8px;
  }
  .material-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }
  .material-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .material-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .material-icon { font-size: 28px; margin-bottom: 10px; }
  .material-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .material-meta { font-size: 12px; color: var(--text2); }
  .progress-bar-wrap {
    background: var(--surface3);
    border-radius: 4px;
    height: 4px;
    margin-top: 10px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    border-radius: 4px;
    background: var(--accent);
    transition: width 0.5s ease;
  }

  /* TIMER */
  .timer-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    align-items: start;
  }
  .timer-display { text-align: center; padding: 32px 20px 48px; }
  .mode-tabs {
    display: flex; gap: 6px; justify-content: center; margin-bottom: 28px;
  }
  .mode-tab {
    padding: 7px 20px; border-radius: 20px;
    border: 1px solid var(--border); background: none;
    color: var(--text2); font-size: 13px; cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s;
    font-weight: 500;
  }
  .mode-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .timer-time-wrap {
    display: flex; align-items: center; justify-content: center;
    gap: 2px; margin-bottom: 12px;
  }
  .timer-part {
    font-family: 'Space Mono', monospace;
    font-size: 72px; font-weight: 700;
    color: var(--text); line-height: 1;
    cursor: pointer; border-radius: 10px;
    padding: 4px 8px;
    transition: background 0.15s;
  }
  .timer-part:hover { background: var(--surface3); }
  .timer-colon {
    font-family: 'Space Mono', monospace;
    font-size: 72px; font-weight: 700;
    color: var(--text3); line-height: 1;
    padding-bottom: 4px;
  }
  .timer-hint { font-size: 12px; color: var(--text3); margin-bottom: 32px; }
  .timer-controls {
    display: flex; gap: 14px;
    justify-content: center; margin-bottom: 20px;
  }
  .timer-btn {
    width: 56px; height: 56px; border-radius: 50%;
    border: none; cursor: pointer; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .timer-btn.primary { background: var(--accent); color: #fff; width: 68px; height: 68px; font-size: 24px; }
  .timer-btn.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .timer-btn:hover { transform: scale(1.06); }

  /* Study log */
  .log-list { display: flex; flex-direction: column; gap: 8px; max-height: 380px; overflow-y: auto; }
  .log-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 8px;
    font-size: 13px;
  }
  .log-icon { font-size: 18px; flex-shrink: 0; }
  .log-time { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--text2); margin-left: auto; white-space: nowrap; }

  /* TASKS */
  .tasks-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    align-items: start;
  }
  .task-column { display: flex; flex-direction: column; gap: 10px; }
  .task-col-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .task-col-title { font-size: 14px; font-weight: 700; }
  .task-col-count {
    font-size: 12px;
    color: var(--text2);
    background: var(--surface2);
    border-radius: 20px;
    padding: 1px 8px;
  }
  .task-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .task-card:hover { border-color: var(--accent); }
  .task-card-title { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .task-card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .task-priority {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .priority-high { background: rgba(240,91,91,0.15); color: var(--red); }
  .priority-mid { background: rgba(240,145,77,0.15); color: var(--orange); }
  .priority-low { background: rgba(61,214,140,0.15); color: var(--green); }
  .task-due { font-size: 11px; color: var(--text2); margin-left: auto; }

  /* FORMS */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .modal-overlay.open { display: flex; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    transition: border-color 0.2s;
  }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .form-input option { background: var(--surface2); }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .btn-cancel { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; }
  .btn-save { background: var(--accent); color: #fff; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .search-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    width: 200px;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  /* COLOR DOT helpers */
  .dot-blue { background: var(--accent); }
  .dot-green { background: var(--green); }
  .dot-orange { background: var(--orange); }
  .dot-red { background: var(--red); }
  .dot-yellow { background: var(--yellow); }
  .dot-purple { background: var(--accent2); }

  /* LINK BADGE — event↔task */
  .link-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .link-badge.from-event { background: rgba(91,138,240,0.15); color: var(--accent); border: 1px solid rgba(91,138,240,0.3); }
  .link-badge.linked-cal { background: rgba(61,214,140,0.15); color: var(--green); border: 1px solid rgba(61,214,140,0.3); }
  .task-card.from-event { border-left: 3px solid var(--accent); }
  .task-card.done-linked { border-left: 3px solid var(--green); }

  /* calendar done-task dot */
  .cal-day.has-done-task::before {
    content: '';
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--green);
    position: absolute;
    bottom: 4px;
    left: calc(50% - 7px);
  }
  .cal-day.has-event.has-done-task::after { left: calc(50% + 3px); }

  /* GOALS */
  .goals-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: start;
  }
  .goal-tier {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .goal-tier-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .goal-tier-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .goal-tier-icon.long  { background: rgba(240,91,91,0.15); }
  .goal-tier-icon.mid   { background: rgba(240,145,77,0.15); }
  .goal-tier-icon.short { background: rgba(91,138,240,0.15); }
  .goal-tier-label { font-size: 15px; font-weight: 700; }
  .goal-tier-sub   { font-size: 12px; color: var(--text2); }
  .goal-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }
  .goal-item:hover { border-color: var(--accent); }
  .goal-item-text { flex: 1; font-size: 14px; line-height: 1.5; }
  .goal-item-deadline { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .goal-check {
    width: 18px; height: 18px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .goal-item.achieved .goal-item-text { text-decoration: line-through; color: var(--text3); }
  .goal-delete-btn {
    background: none; border: none; color: var(--text3);
    cursor: pointer; font-size: 14px; padding: 0 2px;
    flex-shrink: 0; line-height: 1;
  }
  .goal-delete-btn:hover { color: var(--red); }
  .goal-add-row {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .goal-add-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .goal-add-input:focus { outline: none; border-color: var(--accent); }
  .goal-add-btn {
    background: var(--accent); color: #fff; border: none;
    border-radius: 8px; padding: 8px 14px; cursor: pointer;
    font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700; white-space: nowrap;
  }
  .goal-add-btn:hover { opacity: 0.85; }

  /* sync banner */
  .sync-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(91,138,240,0.1);
    border: 1px solid rgba(91,138,240,0.25);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .sync-banner span { flex:1; }
  .sync-banner button { background: var(--accent); color:#fff; border:none; border-radius:6px; padding:4px 12px; font-size:12px; cursor:pointer; font-family:'Noto Sans JP',sans-serif; }
  /* CHANGELOG MODAL */
  .changelog-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 400;
    display: flex; align-items: center; justify-content: center;

function toggleTheme() {
  const isLight = document.body.classList.toggle('light-mode');
  const icon = isLight ? '☀️' : '🌙';
  document.getElementById('themeBtn').textContent = icon;
  const fab = document.getElementById('themeBtnFab');
  if (fab) fab.textContent = icon;

}

// ========== ROUTING ==========
function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'dashboard') renderDashboard();
  if (id === 'calendar') renderCalendar();
  if (id === 'materials') renderMaterials();
  if (id === 'tasks') renderTasks();
  if (id === 'goals') renderGoals();
}

// ========== INIT ==========

  const now = new Date();
  document.getElementById('todayBadge').textContent = now.toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric',weekday:'short'});
  // テーマ：デフォルトはライトモード
  const savedTheme = localStorage.getItem('studyhub_theme');
  if (savedTheme === 'dark') {
    document.getElementById('themeBtn').textContent = '🌙';
    const fab = document.getElementById('themeBtnFab');
    if (fab) fab.textContent = '🌙';
  } else {
    document.body.classList.add('light-mode');
    document.getElementById('themeBtn').textContent = '☀️';
    const fab = document.getElementById('themeBtnFab');
    if (fab) fab.textContent = '☀️';
  }

  populateTimerSubjects();
  renderLog();
  // URLからデータ読み込み
  loadFromURL();

  startAutoSnapshot();
}

// ========== DASHBOARD ==========
function renderDashboard() {
  // Stats
  const sec = state.todaySeconds;
  document.getElementById('stat-today-time').textContent = `${Math.floor(sec/3600)}h ${String(Math.floor((sec%3600)/60)).padStart(2,'0')}m`;
  const done = state.tasks.filter(t=>t.status==='done').length;
  document.getElementById('stat-tasks-done').textContent = done;
  document.getElementById('stat-streak').textContent = state.streak + '日';

  // Tasks
  const today = new Date().toISOString().split('T')[0];
  const todayTasks = state.tasks.filter(t => t.due === today || t.status !== 'done');
  const tEl = document.getElementById('dashboard-tasks');
  tEl.innerHTML = '';
  (todayTasks.length ? todayTasks.slice(0,6) : state.tasks.slice(0,6)).forEach(task => {
    const div = document.createElement('div');
    div.className = 'today-task-item' + (task.status==='done'?' done':'');
    const col = SUBJECT_HEX[task.subject] || '#5b8af0';
    div.innerHTML = `<input type="checkbox" ${task.status==='done'?'checked':''} onchange="toggleTask(${task.id}, this)">
      <span>${task.title}</span>
      <span class="tag-pill" style="background:${col}22;color:${col}">${task.subject}</span>`;
    tEl.appendChild(div);
  });
  if (!todayTasks.length && !state.tasks.length) tEl.innerHTML = '<p style="color:var(--text2);font-size:13px">タスクがありません</p>';

  // Events
  const todayStr = new Date().toISOString().split('T')[0];
  const todayEvents = state.events.filter(e => e.date === todayStr);
  const eEl = document.getElementById('dashboard-events');
  eEl.innerHTML = '';
  if (!todayEvents.length) {
    eEl.innerHTML = '<p style="color:var(--text2);font-size:13px">今日の予定はありません</p>';
  } else {
    todayEvents.forEach(ev => {
      const col = ev.color || 'accent';
      const div = document.createElement('div');
      div.className = `event-item ${col}`;
      div.innerHTML = `<div class="event-time">${ev.time}</div><div><div class="event-title">${ev.title}</div><div class="event-sub">${ev.subject||''}</div></div>`;
      eEl.appendChild(div);
    });
  }
}

function toggleTask(id, cb) {
  const t = state.tasks.find(x => x.id === id);
  if (t) { t.status = cb.checked ? 'done' : 'todo'; save(); renderDashboard(); renderTasks(); }
}

// ========== CALENDAR ==========
function renderCalendar() {
  const y = calCurrentDate.getFullYear();
  const m = calCurrentDate.getMonth();
  document.getElementById('calMonthLabel').textContent = `${y}年 ${m+1}月`;

  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const daysInPrev = new Date(y, m, 0).getDate();
  const today = new Date();

  let html = '';
  let day = 1;
  for (let i = 0; i < 42; i++) {
    let dateStr, cls = 'cal-day', num;
    if (i < firstDay) {
      num = daysInPrev - firstDay + i + 1;
      dateStr = `${y}-${String(m).padStart(2,'0')}-${String(num).padStart(2,'0')}`;
      cls += ' other-month';
    } else if (day > daysInMonth) {
      num = day - daysInMonth;
      dateStr = `${y}-${String(m+2).padStart(2,'0')}-${String(num).padStart(2,'0')}`;
      cls += ' other-month';
      day++;
    } else {
      num = day;
      dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      if (today.getFullYear()===y && today.getMonth()===m && today.getDate()===day) cls += ' today';
      // event dot (orange)
      if (state.events.some(e => e.date === dateStr)) cls += ' has-event';
      // done-task dot (green) — show completed tasks on their completion date (due date)
      if (state.tasks.some(t => t.status === 'done' && t.due === dateStr)) cls += ' has-done-task';
      if (selectedCalDate === dateStr) cls += ' selected';
      day++;
    }
    html += `<div class="${cls}" onclick="selectDate('${dateStr}')">${num}</div>`;
  }
  document.getElementById('calDays').innerHTML = html;

  if (selectedCalDate) showEventsForDate(selectedCalDate);
  else showEventsForDate(new Date().toISOString().split('T')[0]);
}

function selectDate(dateStr) {
  selectedCalDate = dateStr;
  renderCalendar();
}

function showEventsForDate(dateStr) {

  document.getElementById('selectedDateLabel').textContent = `${parseInt(m)}月${parseInt(d)}日の予定`;

  // 勉強時間を取得
  const todayStr = new Date().toISOString().split('T')[0];
  const history = state.studyHistory || {};
  const secs = dateStr === todayStr ? state.todaySeconds : (history[dateStr] || 0);
  const studyTimeHtml = secs > 0

// ========== TIMER ==========
let timerMode = 'stopwatch'; // 'stopwatch' | 'timer'
let swElapsed = 0; // ストップウォッチ用

function switchTimerMode(mode, btn) {
  if (timerRunning) return; // 動作中は切替不可
  timerMode = mode;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  resetTimer();
  const hint = document.getElementById('timerHint');
  const minEl = document.getElementById('timerMin');
  const secEl = document.getElementById('timerSec');
  if (mode === 'stopwatch') {
    hint.textContent = 'スタートで計測開始';
    minEl.onclick = null; minEl.style.cursor = 'default';
    secEl.onclick = null; secEl.style.cursor = 'default';
    minEl.title = ''; secEl.title = '';
  } else {
    hint.textContent = '分・秒をクリックして時間を設定';
    minEl.onclick = () => editTimerPart('min'); minEl.style.cursor = 'pointer';
    secEl.onclick = () => editTimerPart('sec'); secEl.style.cursor = 'pointer';
    minEl.title = 'クリックで編集'; secEl.title = 'クリックで編集';
  }
}

function updateTimerDisplay() {
  let m, s;
  if (timerMode === 'stopwatch') {
    m = Math.floor(swElapsed / 60);
    s = swElapsed % 60;
  } else {
    m = Math.floor(timerRemaining / 60);
    s = timerRemaining % 60;
  }
  const minEl = document.getElementById('timerMin');
  const secEl = document.getElementById('timerSec');
  if (minEl) minEl.textContent = String(m).padStart(2,'0');
  if (secEl) secEl.textContent = String(s).padStart(2,'0');
}

function editTimerPart(part) {
  if (timerRunning || timerMode !== 'timer') return;
  const current = part === 'min' ? Math.floor(timerRemaining / 60) : timerRemaining % 60;
  const max = part === 'min' ? 99 : 59;
  const label = part === 'min' ? '分' : '秒';
  const val = prompt(`${label}を入力 (0〜${max})`, current);
  if (val === null) return;
  const num = parseInt(val);
  if (isNaN(num) || num < 0 || num > max) { showToast('⚠ 正しい値を入力してください', 'var(--red)'); return; }
  const mins = part === 'min' ? num : Math.floor(timerRemaining / 60);
  const secs = part === 'sec' ? num : timerRemaining % 60;
  timerRemaining = mins * 60 + secs;
  timerTotal = timerRemaining;
  updateTimerDisplay();
}

function toggleTimer() {
  if (timerRunning) {
    // 停止
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('startBtn').textContent = '▶';
    const elapsed = timerMode === 'stopwatch' ? swElapsed : timerElapsed;
    if (elapsed > 0) {
      state.todaySeconds += elapsed;
      addLog('⏸', `${getTimerSubject()} — ${Math.floor(elapsed/60)}分${elapsed%60}秒 停止`);
      if (timerMode === 'stopwatch') swElapsed = 0;
      timerElapsed = 0;
      save();
      updateTimerDisplay();
    }
  } else {
    // タイマーモードで時間が0なら開始しない
    if (timerMode === 'timer' && timerRemaining === 0) return;
    timerRunning = true;
    document.getElementById('startBtn').textContent = '⏸';
    timerInterval = setInterval(() => {
      if (timerMode === 'stopwatch') {
        swElapsed++;
      } else {
        timerRemaining--;
        timerElapsed++;
      }
      updateTimerDisplay();
      // タイマー終了
      if (timerMode === 'timer' && timerRemaining <= 0) {
        clearInterval(timerInterval);
        timerRunning = false;
        document.getElementById('startBtn').textContent = '▶';
        state.todaySeconds += timerElapsed;
        addLog('✅', `${getTimerSubject()} — ${Math.floor(timerElapsed/60)}分 完了！`);
        timerElapsed = 0;
        save();
        document.getElementById('startBtn').style.background = 'var(--green)';
        setTimeout(() => { document.getElementById('startBtn').style.background = 'var(--accent)'; }, 2000);
      }
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning = false;
  timerElapsed = 0;
  swElapsed = 0;
  timerRemaining = timerTotal;
  document.getElementById('startBtn').textContent = '▶';
  document.getElementById('startBtn').style.background = 'var(--accent)';
  updateTimerDisplay();
}

function getTimerSubject() {
  return document.getElementById('timerSubject')?.value || '未設定';
}

function populateTimerSubjects() {
  const sel = document.getElementById('timerSubject');
  SUBJECTS.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });
}

function addLog(icon, text) {
  const now = new Date();
  const time = now.toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit'});
  state.studyLog.unshift({ icon, text, time });
  if (state.studyLog.length > 30) state.studyLog.pop();
  renderLog();
}

  const el = document.getElementById('studyLog');
  if (!state.studyLog.length) { el.innerHTML = '<p style="color:var(--text2);font-size:13px">まだ記録がありません</p>'; return; }
  el.innerHTML = state.studyLog.map((l, i) => `

}

  state.studyLog.splice(index, 1);

const COLUMNS = [
  { id:'doing', label:'進行中', color:'var(--orange)' },
  { id:'done',  label:'完了',   color:'var(--green)'  },
];

function renderTasks(searchQ = '') {
  const todayStr = new Date().toISOString().split('T')[0];

  // Sync banner: events today that don't yet have a matching task
  const todayEvents = state.events.filter(e => e.date === todayStr);
  const unlinkedEvents = todayEvents.filter(ev =>
    !state.tasks.some(t => t.linkedEventId === ev.id)
  );
  const bannerEl = document.getElementById('tasks-sync-banner');
  if (unlinkedEvents.length) {
    bannerEl.innerHTML = `<div class="sync-banner">
      <span>📅 今日の予定が <strong>${unlinkedEvents.length}件</strong> タスクに未反映です</span>
      <button onclick="importTodayEvents()">タスクに取り込む</button>
    </div>`;
  } else {
    bannerEl.innerHTML = '';
  }

  const el = document.getElementById('taskColumns');
  el.innerHTML = '';
  COLUMNS.forEach(col => {
    let tasks = state.tasks.filter(t => t.status === col.id);
    if (searchQ) tasks = tasks.filter(t => t.title.includes(searchQ) || t.subject.includes(searchQ));
    const div = document.createElement('div');
    div.className = 'task-column';
    div.innerHTML = `<div class="task-col-header">
      <span style="width:10px;height:10px;border-radius:50%;background:${col.color};display:inline-block;flex-shrink:0"></span>
      <span class="task-col-title">${col.label}</span>
      <span class="task-col-count">${tasks.length}</span>
    </div>` + tasks.map(t => {
      const col2 = SUBJECT_HEX[t.subject] || '#5b8af0';
      const isFromEvent = !!t.linkedEventId;
      const extraClass = isFromEvent ? (t.status==='done'?'done-linked':'from-event') : '';
      const badge = isFromEvent
        ? `<span class="link-badge from-event">📅 予定より</span>`
        : '';
      return `<div class="task-card ${extraClass}" onclick="openModal('taskEdit',${JSON.stringify(t).replace(/"/g,'&quot;')})">
        <div class="task-card-title">${t.title}</div>
        <div class="task-card-meta">
          <span class="tag-pill" style="background:${col2}22;color:${col2}">${t.subject}</span>
          <span class="task-priority priority-${t.priority}">${t.priority==='high'?'高':'mid'===t.priority?'中':'低'}</span>
          ${badge}
          <span class="task-due">📅 ${t.due}</span>
        </div>
        <div class="task-status-btns" onclick="event.stopPropagation()">
          ${t.status !== 'todo'  ? `<button class="task-status-btn prev" onclick="moveTaskStatus(${t.id},-1)">← ${t.status==='done'?'進行中':'未着手'}</button>` : '<span style="flex:1"></span>'}
          ${t.status !== 'done' ? `<button class="task-status-btn next" onclick="moveTaskStatus(${t.id}, 1)">${t.status==='todo'?'進行中':'完了'} →</button>` : '<span style="flex:1"></span>'}
        </div>
      </div>`;
    }).join('');
    el.appendChild(div);
  });
}

// Import today's unlinked events as tasks
function importTodayEvents() {
  const todayStr = new Date().toISOString().split('T')[0];
  const todayEvents = state.events.filter(e => e.date === todayStr);
  const unlinked = todayEvents.filter(ev => !state.tasks.some(t => t.linkedEventId === ev.id));
  unlinked.forEach(ev => {
    state.tasks.push({
      id: Date.now() + Math.random(),
      title: ev.title,
      subject: ev.subject || 'その他',
      priority: 'mid',
      due: todayStr,
      status: 'doing',
    });
  });
  save();
  renderTasks();
  renderDashboard();
}

function filterTasks(q) { renderTasks(q); }

function moveTaskStatus(id, dir) {
  const ORDER = ['doing', 'done'];
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  // todoのタスクはdoingに変換
  if (t.status === 'todo') t.status = 'doing';
  const idx = ORDER.indexOf(t.status);
  const next = ORDER[idx + dir];
  if (!next) return;
  t.status = next;
  save();
  renderTasks();
  renderDashboard();
  if (document.getElementById('tab-calendar').classList.contains('active')) renderCalendar();
}

// Save functions
function saveEvent() {
  const t = document.getElementById('f-title').value.trim();
  if (!t) return;
  const newEv = {
    id: Date.now(),
    date: document.getElementById('f-date').value,
    time: document.getElementById('f-time').value,
    title: t,
    subject: document.getElementById('f-subject').value,
    color: document.getElementById('f-color').value
  };
  state.events.push(newEv);
  // If the event is today, also create a task automatically
  const todayStr = new Date().toISOString().split('T')[0];
  if (newEv.date === todayStr) {
    state.tasks.push({
      id: Date.now() + 1,
      title: newEv.title,
      subject: newEv.subject || 'その他',
      priority: 'mid',
      due: todayStr,
      status: 'doing',
      linkedEventId: newEv.id,
    });
  }
  save(); closeModal(); renderCalendar(); renderDashboard();
  if (document.getElementById('tab-tasks').classList.contains('active')) renderTasks();
}

function saveMaterial() {
  const n = document.getElementById('f-name').value.trim();

// ========== GOALS ==========
function ensureGoals() {
  if (!state.goals) state.goals = { mid: [], short: [] };
  ['mid','short'].forEach(t => { if (!state.goals[t]) state.goals[t] = []; });
}

function renderGoals() {
  ensureGoals();
  ['mid','short'].forEach(tier => {
    const el = document.getElementById('goals-' + tier);
    if (!el) return;
    const goals = state.goals[tier];
    if (!goals.length) {
      el.innerHTML = `<div style="color:var(--text3);font-size:13px;padding:8px 0">まだ目標がありません</div>`;
      return;
    }
    el.innerHTML = goals.map(g => `
      <div class="goal-item ${g.achieved ? 'achieved' : ''}">
        <input type="checkbox" class="goal-check" ${g.achieved?'checked':''} onchange="toggleGoal('${tier}',${g.id},this)">
        <div class="goal-item-text">
          ${g.text}
          ${g.deadline ? `<div class="goal-item-deadline">🗓 ${g.deadline}</div>` : ''}
        </div>
        <button class="goal-delete-btn" onclick="deleteGoal('${tier}',${g.id})">×</button>
      </div>`).join('');
  });
}

function addGoal(tier) {
  ensureGoals();
  const input = document.getElementById('input-' + tier);
  const dateEl = document.getElementById('date-' + tier);
  const text = input.value.trim();
  if (!text) return;
  state.goals[tier].push({
    id: Date.now(),
    text,
    deadline: dateEl.value || '',
    achieved: false,
  });
  input.value = '';
  dateEl.value = '';
  save();
  renderGoals();
}

function toggleGoal(tier, id, cb) {
  ensureGoals();
  const g = state.goals[tier].find(x => x.id === id);
  if (g) { g.achieved = cb.checked; save(); renderGoals(); }
}

function deleteGoal(tier, id) {
  ensureGoals();
  state.goals[tier] = state.goals[tier].filter(g => g.id !== id);
  save();
  renderGoals();
}

// ========== AUTO SNAPSHOT ==========
const SNAPSHOT_KEY = 'studyhub_snapshots';
const MAX_SNAPSHOTS = 5;
const SNAPSHOT_INTERVAL_MS = 30 * 60 * 1000; // 30分

function takeSnapshot(label) {
  const snapshots = JSON.parse(localStorage.getItem(SNAPSHOT_KEY) || '[]');
  const now = new Date();
  const timeStr = now.toLocaleString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
  const snap = {
    id: now.getTime(),
    label: label || `自動保存 ${timeStr}`,
    data: JSON.stringify(state),
    taskCount: state.tasks.length,
    eventCount: state.events.length,
  };
  snapshots.unshift(snap);
  // 最大5件に制限
  if (snapshots.length > MAX_SNAPSHOTS) snapshots.length = MAX_SNAPSHOTS;
  localStorage.setItem(SNAPSHOT_KEY, JSON.stringify(snapshots));
  renderSnapshotList();
  showToast('💾 スナップショットを保存しました', 'var(--accent)');
}

function restoreSnapshot(id) {
  const snapshots = JSON.parse(localStorage.getItem(SNAPSHOT_KEY) || '[]');
  const snap = snapshots.find(s => s.id === id);
  if (!snap) return;
  if (!confirm(`「${snap.label}」のデータに復元しますか？\n現在のデータは上書きされます。`)) return;
  try {
    state = JSON.parse(snap.data);
    save();
    renderDashboard();
    renderLog();
    updateTimerDisplay();
    showToast('✅ スナップショットから復元しました', 'var(--green)');
    toggleSnapshotPanel();
  } catch(e) {
    showToast('❌ 復元に失敗しました', 'var(--red)');
  }
}

function deleteSnapshot(id) {
  let snapshots = JSON.parse(localStorage.getItem(SNAPSHOT_KEY) || '[]');
  snapshots = snapshots.filter(s => s.id !== id);
  localStorage.setItem(SNAPSHOT_KEY, JSON.stringify(snapshots));
  renderSnapshotList();
}

function renderSnapshotList() {
  const el = document.getElementById('snapshot-list');
  if (!el) return;
  const snapshots = JSON.parse(localStorage.getItem(SNAPSHOT_KEY) || '[]');
  if (!snapshots.length) {
    el.innerHTML = '<div style="color:var(--text3);font-size:13px;text-align:center;padding:12px 0">まだスナップショットがありません</div>';
    return;
  }
  el.innerHTML = snapshots.map(s => `
    <div style="display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;">
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.label}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px;">タスク${s.taskCount}件 · 予定${s.eventCount}件</div>
      </div>
      <button onclick="restoreSnapshot(${s.id})" style="background:var(--accent);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:700;white-space:nowrap;">復元</button>
      <button onclick="deleteSnapshot(${s.id})" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:0 2px;line-height:1;" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--text3)'">×</button>
    </div>`).join('');
}

  const panel = document.getElementById('snapshot-panel');

// ========== URL SAVE / LOAD ==========
async function saveToURL() {
  try {
    const exportState = { ...state, appVersion: APP_VERSION };
    const json = JSON.stringify(exportState);
    const compressed = btoa(encodeURIComponent(json));
    const longUrl = location.origin + location.pathname + '#data=' + compressed;

    // CleanURI → TinyURL の順で短縮を試みる
    showToast('🔗 URL生成中…', 'var(--text2)');

    // ① CleanURI（CORSサポートあり・APIキー不要）
    try {
      const res = await fetch('https://cleanuri.com/api/v1/shorten', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'url=' + encodeURIComponent(longUrl),
      });
      if (res.ok) {
        const data = await res.json();
        if (data.result_url) {
          if (navigator.clipboard) await navigator.clipboard.writeText(data.result_url);
          else prompt('このURLをコピーしてください：', data.result_url);
          showToast('🔗 短縮URLをコピーしました！', 'var(--accent)');
          return;
        }
      }
    } catch(_) {}

    // ② TinyURL
    try {
      const res = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(longUrl)}`);
      if (res.ok) {
        const shortUrl = await res.text();
        if (shortUrl.startsWith('http')) {
          if (navigator.clipboard) await navigator.clipboard.writeText(shortUrl);
          else prompt('このURLをコピーしてください：', shortUrl);
          showToast('🔗 短縮URLをコピーしました！', 'var(--accent)');
          return;
        }
      }
    } catch(_) {}

    // ③ フォールバック：長いURLそのままコピー
    if (navigator.clipboard) {
      await navigator.clipboard.writeText(longUrl);
      showToast('🔗 URLをコピーしました（短縮サービス利用不可）', 'var(--orange)');
    } else {
      prompt('このURLをコピーしてください：', longUrl);
    }
  } catch(e) {
    showToast('❌ URLの生成に失敗しました（データが大きすぎる可能性があります）', 'var(--red)');
  }
}

function loadFromURL() {
  const hash = location.hash;
  if (!hash.startsWith('#data=')) return;
  try {
    const json = decodeURIComponent(atob(hash.slice(6)));
    const parsed = JSON.parse(json);
    if (!parsed.tasks || !parsed.events || !parsed.materials) return;

    // バージョン移行処理
    const dataVersion = parsed.appVersion || '1.0.0';
    if (!confirm(`URLのデータを読み込みますか？\n現在のデータは上書きされます。\n(保存時のバージョン: ${dataVersion})`)) {
      history.replaceState(null, '', location.pathname);
      return;
    }
    // 旧バージョンのデータに足りないフィールドを補完
    if (!parsed.goals) parsed.goals = { long: [], mid: [], short: [] };
    if (!parsed.diary) parsed.diary = {};
    if (!parsed.studyLog) parsed.studyLog = [];
    parsed.appVersion = APP_VERSION;

    state = parsed;
    save();
    renderDashboard();
    renderLog();
    populateTimerSubjects();
    updateTimerDisplay();
    history.replaceState(null, '', location.pathname);
    showToast('✅ URLからデータを復元しました', 'var(--green)');
  } catch(e) {
    history.replaceState(null, '', location.pathname);
  }
}

// ========== EXPORT / IMPORT ==========
function exportData() {
  const now = new Date();
  const dateStr = now.toISOString().slice(0,10);
  const filename = `studyhub-v2-backup-${dateStr}.json`;
  const exportState = { ...state, appVersion: APP_VERSION };
  const json = JSON.stringify(exportState, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  showToast('⬇ バックアップを保存しました', 'var(--accent)');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      // 最低限のバリデーション
      if (!parsed.tasks || !parsed.events || !parsed.materials) {
        showToast('❌ ファイルの形式が正しくありません', 'var(--red)');
        return;
      }
      if (!confirm(`バックアップを復元しますか？\n現在のデータは上書きされます。`)) return;
      const backupVersion = parsed.appVersion || '2.0';
      state = parsed;
      state.appVersion = APP_VERSION;
      save();
      // 全画面を再描画
      renderDashboard();
      renderLog();
      populateTimerSubjects();
      updateTimerDisplay();
      showToast('✅ データを復元しました', 'var(--green)');
    } catch(err) {
      showToast('❌ 読み込みに失敗しました', 'var(--red)');
    }
  };
  reader.readAsText(file);
  // 同じファイルを再度選べるようにリセット
  event.target.value = '';
}

function showToast(msg, color) {
  const el = document.createElement('div');
  el.style.cssText = `position:fixed;bottom:80px;right:16px;background:${color};color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:999;font-family:'Noto Sans JP',sans-serif;box-shadow:0 4px 16px rgba(0,0,0,0.4);transition:opacity 0.4s;`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }, 2500);
}

// ========== TUTORIAL ==========
const TUTORIAL_STEPS = [
  { icon:'🏠', title:'ダッシュボード', desc:'今日の勉強時間・完了タスク・連続記録を確認できます。このページ下部の「使い方ガイド」から各機能にアクセスできます。' },
  { icon:'📅', title:'予定表', desc:'勉強の予定をカレンダーで管理。当日になった予定は自動でタスクに変換されます。' },
  { icon:'✅', title:'タスク', desc:'「進行中」と「完了」の2列で管理します。カード下のボタンでステータスを変更できます。' },
  { icon:'⏱', title:'タイマー', desc:'ストップウォッチかタイマーを選んで勉強時間を計測。終了すると勉強ログに自動記録されます。' },
  { icon:'💾', title:'データ保存', desc:'右上の💾ボタンからバックアップ・復元・URL共有ができます。30分ごとに自動スナップショットも保存されます。' },
];
let tutorialStep = 0;

function showTutorial() {
  tutorialStep = 0;
  const overlay = document.createElement('div');
  overlay.className = 'tutorial-overlay';
  overlay.id = 'tutorial-overlay';
  document.body.appendChild(overlay);
  renderTutorialStep();
}

function renderTutorialStep() {
  const overlay = document.getElementById('tutorial-overlay');
  if (!overlay) return;
  const step = TUTORIAL_STEPS[tutorialStep];
  const total = TUTORIAL_STEPS.length;
  const isLast = tutorialStep === total - 1;
  const dots = TUTORIAL_STEPS.map((_,i) => `<div class="tutorial-dot ${i<tutorialStep?'done':i===tutorialStep?'active':''}"></div>`).join('');
  overlay.innerHTML = `
    <div class="tutorial-box">
      <div class="tutorial-icon">${step.icon}</div>
      <div class="tutorial-step-num">STEP ${tutorialStep+1} / ${total}</div>
      <div class="tutorial-title">${step.title}</div>
      <div class="tutorial-desc">${step.desc}</div>
      <div class="tutorial-progress">${dots}</div>
      <div class="tutorial-actions">
        <button class="tutorial-skip" onclick="closeTutorial()">閉じる</button>
        ${isLast ? `<button class="tutorial-finish" onclick="closeTutorial()">完了 🎉</button>` : `<button class="tutorial-next" onclick="nextTutorialStep()">次へ →</button>`}
      </div>
    </div>`;
}

function nextTutorialStep() {
  if (tutorialStep < TUTORIAL_STEPS.length - 1) { tutorialStep++; renderTutorialStep(); }
}

function closeTutorial() {
  const el = document.getElementById('tutorial-overlay');
  if (el) { el.style.pointerEvents='none'; el.style.opacity='0'; el.style.transition='opacity 0.3s'; setTimeout(()=>{ if(el.parentNode)el.parentNode.removeChild(el); },320); }
}

        const menu = document.getElementById('mobile-save-menu');
        const btn = document.querySelector('#mobile-fab .fab-btn.primary');
        if (menu && !menu.contains(e.target) && e.target !== btn && !btn?.contains(e.target)) {
          menu.style.display = 'none';
          document.removeEventListener('click', closeMobileMenu);
        }
      });
    }, 100);
  }
}

function closeMobileSaveMenu() {
  const menu = document.getElementById('mobile-save-menu');
  if (menu) menu.style.display = 'none';
}

init();
</script>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut as fbSignOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getDatabase, ref, set, onValue, off } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyD7qEmlPynkP_RFv0aDAmqEKEIbKKtPp4U",
  authDomain: "studyhub-63832.firebaseapp.com",
  databaseURL: "https://studyhub-63832-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "studyhub-63832",
  storageBucket: "studyhub-63832.firebasestorage.app",
  messagingSenderId: "53272438516",
  appId: "1:53272438516:web:c794c6d1179d99b6ace0a1"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const googleProvider = new GoogleAuthProvider();
let currentUser = null;
let dbRef = null;
let isSyncing = false;
Object.defineProperty(window, '_isSyncing', { get: () => isSyncing });

// ========== AUTH STATE ==========
onAuthStateChanged(auth, (user) => {
  if (user) {
    currentUser = user;
    showApp(user);
    startSync(user.uid);
  } else {
    currentUser = null;
    stopSync();
    showAuthScreen();
  }
});

function showApp(user) {
  // ログイン画面を非表示
  const authOverlay = document.getElementById('auth-overlay');
  if (authOverlay) authOverlay.remove();

  // ユーザーバーを表示
  document.getElementById('userBar').style.display = 'flex';
  const initials = (user.displayName || user.email || '?')[0].toUpperCase();
  document.getElementById('userAvatar').textContent = initials;
  document.getElementById('userEmail').textContent = user.displayName || user.email;
}

function showAuthScreen() {
  document.getElementById('userBar').style.display = 'none';
  // すでに表示中なら何もしない
  if (document.getElementById('auth-overlay')) return;

  const overlay = document.createElement('div');
  overlay.className = 'auth-overlay';
  overlay.id = 'auth-overlay';
  overlay.innerHTML = `
    <div class="auth-box">
      <div class="auth-logo">STUDY<span>HUB</span></div>
      <div class="auth-subtitle">ログインして学習データを同期</div>
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">ログイン</button>
        <button class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">新規登録</button>
      </div>
      <div id="auth-error" class="auth-error"></div>
      <input class="auth-input" id="auth-email" type="email" placeholder="メールアドレス">
      <input class="auth-input" id="auth-password" type="password" placeholder="パスワード（6文字以上）">
      <button class="auth-btn primary" id="auth-submit-btn" onclick="submitAuth()">ログイン</button>
      <div class="auth-divider">または</div>
      <button class="auth-btn google" onclick="loginWithGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Googleでログイン
      </button>
      <div style="text-align:center;margin-top:16px;font-size:12px;color:var(--text3)">
        データはあなたのアカウントに安全に保存されます
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

// Auth tab switch
window.switchAuthTab = function(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('auth-submit-btn').textContent = tab === 'login' ? 'ログイン' : '新規登録';
  document.getElementById('auth-submit-btn').onclick = tab === 'login'
    ? () => window.submitAuth('login')
    : () => window.submitAuth('signup');
  document.getElementById('auth-error').style.display = 'none';
};

window.submitAuth = async function(mode) {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  errEl.style.display = 'none';
  if (!email || !password) { showAuthError('メールアドレスとパスワードを入力してください'); return; }
  try {
    if (mode === 'signup') {
      await createUserWithEmailAndPassword(auth, email, password);
    } else {
      await signInWithEmailAndPassword(auth, email, password);
    }
  } catch(e) {
    const msgs = {
      'auth/email-already-in-use': 'このメールアドレスはすでに使われています',
      'auth/invalid-email': 'メールアドレスの形式が正しくありません',
      'auth/weak-password': 'パスワードは6文字以上にしてください',
      'auth/user-not-found': 'アカウントが見つかりません',
      'auth/wrong-password': 'パスワードが間違っています',
      'auth/invalid-credential': 'メールアドレスまたはパスワードが間違っています',
    };
    showAuthError(msgs[e.code] || 'エラーが発生しました: ' + e.message);
  }
};

window.loginWithGoogle = async function() {
  try {
    await signInWithPopup(auth, googleProvider);
  } catch(e) {
    showAuthError('Googleログインに失敗しました');
  }
};

window.signOut = async function() {
  if (!confirm('ログアウトしますか？')) return;
  await fbSignOut(auth);
};

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

// ========== FIREBASE SYNC ==========
function setSyncStatus(status) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.className = 'sync-status ' + status;
  el.textContent = status === 'syncing' ? '↑' : status === 'synced' ? '✓' : '●';
  el.title = status === 'syncing' ? '同期中…' : status === 'synced' ? '同期済み' : 'オフライン';
}

function startSync(uid) {
  dbRef = ref(db, `users/${uid}/state`);
  // Firebaseからデータを受信（リアルタイム監視）
  onValue(dbRef, (snapshot) => {
    if (isSyncing) return; // 自分が書き込み中なら無視
    const data = snapshot.val();
    if (data) {
      // ローカルより新しければ上書き
      const remoteTime = data._updatedAt || 0;
      const localTime = state._updatedAt || 0;
      if (remoteTime > localTime) {
        isSyncing = true; // 受信中はsaveをブロック
        state = data;
        localStorage.setItem('studyhub_v2', JSON.stringify(state));
        renderDashboard();
        renderLog();
        updateTimerDisplay();
        setSyncStatus('synced');
        setTimeout(() => { isSyncing = false; }, 2000); // 2秒後に解除
      }
    }
    setSyncStatus('synced');
  });
}

function stopSync() {
  if (dbRef) { off(dbRef); dbRef = null; }
}

// saveをオーバーライドしてFirebaseにも書き込む
const _originalSave = window._saveFn || null;
window._firebaseSave = async function() {
  // Firebaseに保存（localStorage側はsave()が担当）
  if (currentUser && dbRef) {
    isSyncing = true;
    setSyncStatus('syncing');
    try {
      await set(dbRef, state);
      setSyncStatus('synced');
    } catch(e) {
      setSyncStatus('offline');
    }
    isSyncing = false;
  }
};

// グローバルのsave関数をFirebase対応版に差し替え
// （モジュール外から呼べるようwindowに登録）
window._firebaseSaveReady = true;
</script>
